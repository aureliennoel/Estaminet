<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>L'amusette — Pointeuse Premium</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap"
      rel="stylesheet">

<style>

/* =========================================================
ROOT
========================================================= */

:root{

  --navy:#10203a;
  --navy2:#1c3157;
  --navy3:#2b4676;

  --accent:#b42318;
  --accent2:#d62828;

  --green:#1fa971;

  --cream:#f8f5f1;
  --cream2:#f2eee8;

  --white:#ffffff;

  --gray:#ece7e0;
  --gray2:#ddd7ce;

  --text:#17253f;
  --text2:#6f7b92;
  --text3:#a0a8b8;

  --radius:28px;

  --shadow:
    0 8px 24px rgba(15,23,42,.06);

  --shadow-lg:
    0 18px 44px rgba(15,23,42,.14);

  --font:'DM Sans',sans-serif;
  --font-serif:'DM Serif Display',serif;

}

/* =========================================================
GLOBAL
========================================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  scroll-behavior:smooth;
}

body{

  background:
    linear-gradient(
      180deg,
      var(--cream),
      var(--cream2)
    );

  color:var(--text);

  font-family:var(--font);

  min-height:100vh;

  max-width:430px;

  margin:auto;

  padding-bottom:120px;

}

button,input{
  font-family:var(--font);
}

button{
  border:none;
  cursor:pointer;
}

input{
  outline:none;
}

/* =========================================================
VIEW
========================================================= */

.view{
  display:none;
  padding:0 18px 30px;
  animation:fade .22s ease;
}

.view.active{
  display:block;
}

@keyframes fade{

  from{
    opacity:0;
    transform:translateY(8px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

/* =========================================================
HEADER
========================================================= */

.header{

  margin:0 -18px 28px;

  padding:28px 22px 34px;

  border-radius:
    0 0 36px 36px;

  background:
    linear-gradient(
      145deg,
      var(--navy),
      var(--navy2)
    );

  position:relative;

  overflow:hidden;

  box-shadow:
    0 12px 40px rgba(16,32,58,.22);

}

.header::before{

  content:'';

  position:absolute;

  width:220px;
  height:220px;

  border-radius:50%;

  background:
    rgba(255,255,255,.04);

  top:-110px;
  right:-70px;

}

.header::after{

  content:'';

  position:absolute;

  width:120px;
  height:120px;

  border-radius:50%;

  background:
    rgba(214,40,40,.10);

  left:-20px;
  bottom:-50px;

}

.header-top{

  display:flex;
  align-items:center;
  gap:16px;

  position:relative;
  z-index:2;

}

.logo{

  width:70px;
  height:70px;

  border-radius:24px;

  background:
    linear-gradient(
      145deg,
      var(--accent),
      var(--accent2)
    );

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:32px;

  box-shadow:
    0 10px 28px rgba(214,40,40,.28);

}

.brand-title{

  font-size:32px;

  color:white;

  font-family:var(--font-serif);

}

.brand-sub{

  margin-top:4px;

  font-size:11px;

  text-transform:uppercase;

  letter-spacing:2px;

  color:rgba(255,255,255,.52);

}

.status{

  margin-top:24px;

  display:flex;
  align-items:center;
  gap:8px;

  position:relative;
  z-index:2;

}

.dot{

  width:10px;
  height:10px;

  border-radius:50%;

  background:
    rgba(255,255,255,.25);

}

.dot.live{

  background:var(--green);

  animation:pulse 1.8s infinite;

}

@keyframes pulse{

  0%{
    box-shadow:0 0 0 0 rgba(31,169,113,.5);
  }

  70%{
    box-shadow:0 0 0 8px rgba(31,169,113,0);
  }

  100%{
    box-shadow:0 0 0 0 rgba(31,169,113,0);
  }

}

.status-text{

  color:
    rgba(255,255,255,.84);

  font-size:13px;

}

.clock{

  margin-left:auto;

  font-size:13px;

  color:
    rgba(255,255,255,.44);

}

/* =========================================================
CARD
========================================================= */

.card{

  background:
    rgba(255,255,255,.82);

  backdrop-filter:blur(20px);

  border:
    1px solid rgba(255,255,255,.65);

  border-radius:var(--radius);

  box-shadow:var(--shadow);

  transition:
    .22s cubic-bezier(.4,0,.2,1);

}

.card:hover{
  transform:translateY(-1px);
}

/* =========================================================
TIMER
========================================================= */

.timer-card{

  padding:34px 24px;

  text-align:center;

  margin-bottom:18px;

  position:relative;

  overflow:hidden;

}

.timer-card::before{

  content:'';

  position:absolute;

  top:0;
  left:0;
  right:0;

  height:5px;

  background:
    linear-gradient(
      90deg,
      var(--navy),
      var(--accent2)
    );

}

.timer-state{

  font-size:11px;

  font-weight:700;

  letter-spacing:2px;

  text-transform:uppercase;

  color:var(--text3);

}

.timer-state.live{
  color:var(--green);
}

.timer{

  margin-top:12px;

  font-size:74px;

  font-weight:700;

  letter-spacing:-4px;

  color:var(--text);

}

.timer-sub{

  margin-top:12px;

  color:var(--text2);

  font-size:14px;

}

.btns{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:12px;

  margin-top:28px;

}

.btn{

  padding:18px;

  border-radius:22px;

  font-size:15px;

  font-weight:700;

  transition:
    .22s cubic-bezier(.4,0,.2,1);

  position:relative;

  overflow:hidden;

}

.btn:active{
  transform:scale(.96);
}

.btn-primary{

  background:
    linear-gradient(
      145deg,
      var(--navy),
      var(--navy3)
    );

  color:white;

  box-shadow:
    0 10px 24px rgba(16,32,58,.22);

}

.btn-danger{

  background:
    linear-gradient(
      145deg,
      var(--accent),
      var(--accent2)
    );

  color:white;

  box-shadow:
    0 10px 24px rgba(214,40,40,.18);

}

.btn:disabled{
  opacity:.35;
}

/* =========================================================
STATS
========================================================= */

.stats{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:14px;

  margin-bottom:18px;

}

.stat{

  padding:20px;

  position:relative;

  overflow:hidden;

}

.stat::before{

  content:'';

  position:absolute;

  width:120px;
  height:120px;

  border-radius:50%;

  background:
    rgba(255,255,255,.24);

  top:-70px;
  right:-40px;

}

.stat::after{

  content:'';

  position:absolute;

  left:0;
  right:0;
  bottom:0;

  height:4px;

}

.stat.blue::after{
  background:var(--navy);
}

.stat.red::after{
  background:var(--accent2);
}

.stat-label{

  font-size:11px;

  font-weight:700;

  letter-spacing:1px;

  text-transform:uppercase;

  color:var(--text3);

}

.stat-value{

  margin-top:12px;

  font-size:34px;

  font-weight:700;

  letter-spacing:-1px;

}

/* =========================================================
SECTION
========================================================= */

.section-header{

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:14px;

}

.section-title{

  font-size:24px;

  font-weight:700;

}

.add-btn{

  width:54px;
  height:54px;

  border-radius:20px;

  background:
    linear-gradient(
      145deg,
      var(--navy),
      var(--navy3)
    );

  color:white;

  font-size:24px;

  box-shadow:
    0 10px 24px rgba(16,32,58,.22);

  transition:
    .22s cubic-bezier(.4,0,.2,1);

}

.add-btn:active{
  transform:scale(.92);
}

/* =========================================================
SESSIONS
========================================================= */

.sessions{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.session{

  background:
    rgba(255,255,255,.84);

  backdrop-filter:blur(20px);

  border-radius:26px;

  padding:18px;

  display:flex;
  align-items:center;
  gap:14px;

  box-shadow:
    0 8px 24px rgba(15,23,42,.06);

  transition:
    .22s cubic-bezier(.4,0,.2,1);

}

.session:hover{

  transform:
    translateY(-2px);

}

.session-dot{

  width:12px;
  height:12px;

  border-radius:50%;

  background:
    linear-gradient(
      145deg,
      var(--navy),
      var(--navy3)
    );

  box-shadow:
    0 0 0 6px rgba(16,32,58,.08);

}

.session-info{
  flex:1;
}

.session-date{

  font-size:15px;

  font-weight:700;

}

.session-hours{

  margin-top:5px;

  font-size:13px;

  color:var(--text2);

}

.session-duration{

  font-size:24px;

  font-weight:700;

}

.session-actions{

  display:flex;
  gap:8px;

}

.action{

  width:38px;
  height:38px;

  border-radius:14px;

  font-size:15px;

  transition:.15s;

}

.action:active{
  transform:scale(.9);
}

.edit{
  background:#eef2ff;
}

.delete{
  background:#ffe9e9;
}

/* =========================================================
PAGE TITLE
========================================================= */

.page-title{

  padding:24px 0 22px;

  text-align:center;

  font-size:32px;

  font-family:var(--font-serif);

}

/* =========================================================
CONTRACT
========================================================= */

.contract-card{

  padding:26px;

  margin-bottom:18px;

  border-radius:32px;

  background:
    linear-gradient(
      145deg,
      var(--navy),
      var(--navy2)
    );

  color:white;

  position:relative;

  overflow:hidden;

  box-shadow:
    0 16px 40px rgba(16,32,58,.22);

}

.contract-card::before{

  content:'';

  position:absolute;

  width:220px;
  height:220px;

  border-radius:50%;

  background:
    rgba(255,255,255,.05);

  top:-120px;
  right:-70px;

}

.contract-top{

  display:flex;
  justify-content:space-between;
  align-items:center;

  position:relative;
  z-index:2;

}

.contract-badge{

  background:
    rgba(255,255,255,.10);

  border:
    1px solid rgba(255,255,255,.10);

  padding:8px 14px;

  border-radius:30px;

  font-size:12px;

  font-weight:700;

}

.solde-label{

  margin-top:24px;

  font-size:13px;

  color:
    rgba(255,255,255,.62);

}

.solde-value{

  margin-top:14px;

  font-size:58px;

  font-weight:700;

  letter-spacing:-3px;

}

.progress{

  margin-top:22px;

  height:12px;

  border-radius:30px;

  background:
    rgba(255,255,255,.12);

  overflow:hidden;

}

.progress-bar{

  height:100%;

  width:0%;

  border-radius:30px;

  background:
    linear-gradient(
      90deg,
      #fff,
      rgba(255,255,255,.7)
    );

}

/* =========================================================
SETTINGS
========================================================= */

.settings{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.setting{

  padding:18px;

}

.setting label{

  display:block;

  margin-bottom:10px;

  font-size:11px;

  font-weight:700;

  text-transform:uppercase;

  letter-spacing:1px;

  color:var(--text3);

}

.setting input{

  width:100%;

  background:var(--gray);

  border:none;

  border-radius:18px;

  padding:16px;

  font-size:16px;

}

/* =========================================================
NAVBAR
========================================================= */

.nav{

  position:fixed;

  left:50%;
  transform:translateX(-50%);

  bottom:14px;

  width:calc(100% - 24px);
  max-width:406px;

  padding:12px 10px 18px;

  border-radius:34px;

  background:
    rgba(255,255,255,.74);

  backdrop-filter:blur(26px);

  border:
    1px solid rgba(255,255,255,.66);

  box-shadow:
    0 12
