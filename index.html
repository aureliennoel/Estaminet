<!-- =========================================================
L'AMUSETTE — POINTEUSE PREMIUM V2
INDEX.HTML
========================================================= -->

<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>L'amusette — Pointeuse</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>

/* =========================================================
ROOT
========================================================= */

:root{

  --navy:#14213d;
  --navy2:#1d3157;
  --navy3:#304878;

  --accent:#b42318;
  --accent2:#d62828;

  --green:#1fa971;

  --cream:#f8f5f1;
  --white:#ffffff;

  --gray:#efebe5;
  --gray2:#e2ddd5;

  --text:#18253f;
  --text2:#69758e;
  --text3:#9ba4b5;

  --radius:24px;

  --shadow:
    0 2px 10px rgba(16,24,40,.05),
    0 10px 30px rgba(16,24,40,.07);

  --shadow-lg:
    0 12px 40px rgba(16,24,40,.16);

  --font:'DM Sans',sans-serif;
  --font-serif:'DM Serif Display',serif;

}

/* =========================================================
GLOBAL
========================================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  scroll-behavior:smooth;
}

body{

  background:var(--cream);

  color:var(--text);

  font-family:var(--font);

  max-width:430px;

  margin:auto;

  min-height:100vh;

  padding-bottom:120px;

}

button,input{
  font-family:var(--font);
}

input{
  outline:none;
}

/* =========================================================
VIEW
========================================================= */

.view{
  display:none;
  padding:0 18px 30px;
  animation:fade .25s ease;
}

.view.active{
  display:block;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(6px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* =========================================================
HEADER
========================================================= */

.header{

  margin:0 -18px 24px;

  padding:24px 22px 28px;

  background:
    linear-gradient(
      135deg,
      var(--navy),
      var(--navy2)
    );

  position:relative;

  overflow:hidden;

  color:#fff;

}

.header::before{

  content:'';

  position:absolute;

  width:180px;
  height:180px;

  border-radius:50%;

  background:rgba(255,255,255,.04);

  top:-70px;
  right:-40px;

}

.header::after{

  content:'';

  position:absolute;

  width:100px;
  height:100px;

  border-radius:50%;

  background:rgba(255,255,255,.03);

  bottom:-30px;
  left:40px;

}

.header-top{

  display:flex;
  align-items:center;

  gap:14px;

  position:relative;
  z-index:2;

}

.logo{

  width:60px;
  height:60px;

  border-radius:20px;

  background:
    linear-gradient(
      135deg,
      var(--accent),
      var(--accent2)
    );

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:var(--shadow-lg);

}

.logo svg{
  width:28px;
  height:28px;
  fill:#fff;
}

.brand-title{

  font-size:30px;

  font-family:var(--font-serif);

}

.brand-sub{

  margin-top:4px;

  font-size:11px;

  text-transform:uppercase;

  letter-spacing:2px;

  color:rgba(255,255,255,.55);

}

.status{

  margin-top:22px;

  display:flex;
  align-items:center;

  gap:8px;

  position:relative;
  z-index:2;

}

.dot{

  width:10px;
  height:10px;

  border-radius:50%;

  background:rgba(255,255,255,.25);

}

.dot.live{

  background:var(--green);

  animation:pulse 1.7s infinite;

}

@keyframes pulse{

  0%{
    box-shadow:0 0 0 0 rgba(31,169,113,.5)
  }

  70%{
    box-shadow:0 0 0 8px rgba(31,169,113,0)
  }

  100%{
    box-shadow:0 0 0 0 rgba(31,169,113,0)
  }

}

.status-text{

  font-size:13px;

  color:rgba(255,255,255,.82);

}

.clock{

  margin-left:auto;

  font-size:13px;

  color:rgba(255,255,255,.45);

}

/* =========================================================
CARDS
========================================================= */

.card{

  background:rgba(255,255,255,.86);

  backdrop-filter:blur(16px);

  border:1px solid rgba(255,255,255,.5);

  border-radius:var(--radius);

  box-shadow:var(--shadow);

  transition:.25s cubic-bezier(.4,0,.2,1);

}

.card:hover{
  transform:translateY(-1px);
}

/* =========================================================
TIMER
========================================================= */

.timer-card{

  padding:30px 22px;

  text-align:center;

  margin-bottom:18px;

}

.timer-state{

  font-size:11px;

  font-weight:700;

  letter-spacing:2px;

  text-transform:uppercase;

  color:var(--text3);

}

.timer-state.live{
  color:var(--green);
}

.timer{

  margin-top:10px;

  font-size:66px;

  font-weight:700;

  letter-spacing:-4px;

}

.timer-sub{

  margin-top:10px;

  color:var(--text2);

  font-size:14px;

}

.btns{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:12px;

  margin-top:26px;

}

.btn{

  border:none;

  border-radius:18px;

  padding:16px;

  cursor:pointer;

  font-weight:700;

  font-size:15px;

  transition:.2s cubic-bezier(.4,0,.2,1);

}

.btn:active{
  transform:scale(.97);
}

.btn-primary{

  background:
    linear-gradient(
      135deg,
      var(--navy),
      var(--navy3)
    );

  color:#fff;

  box-shadow:
    0 8px 20px rgba(20,33,61,.22);

}

.btn-danger{

  background:
    linear-gradient(
      135deg,
      var(--accent),
      var(--accent2)
    );

  color:#fff;

  box-shadow:
    0 8px 20px rgba(214,40,40,.18);

}

.btn:disabled{
  opacity:.35;
}

/* =========================================================
MINI STATS
========================================================= */

.stats{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:14px;

  margin-bottom:18px;

}

.stat{

  padding:18px;

  position:relative;

  overflow:hidden;

}

.stat::after{

  content:'';

  position:absolute;

  left:0;
  right:0;
  bottom:0;

  height:4px;

}

.stat.blue::after{
  background:var(--navy);
}

.stat.red::after{
  background:var(--accent);
}

.stat-label{

  font-size:11px;

  font-weight:700;

  text-transform:uppercase;

  letter-spacing:1px;

  color:var(--text3);

}

.stat-value{

  margin-top:10px;

  font-size:32px;

  font-weight:700;

}

/* =========================================================
SECTION
========================================================= */

.section-header{

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:14px;

}

.section-title{

  font-size:22px;

  font-weight:700;

}

.add-btn{

  width:40px;
  height:40px;

  border:none;

  border-radius:50%;

  background:
    linear-gradient(
      135deg,
      var(--navy),
      var(--navy3)
    );

  color:#fff;

  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;

  transition:.2s;

}

.add-btn:active{
  transform:scale(.92);
}

.add-btn svg{
  width:18px;
  height:18px;
  fill:#fff;
}

/* =========================================================
SESSIONS
========================================================= */

.sessions{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.session{

  background:rgba(255,255,255,.82);

  backdrop-filter:blur(16px);

  border-radius:22px;

  padding:16px;

  display:flex;
  align-items:center;

  gap:14px;

  box-shadow:var(--shadow);

  transition:.25s;

}

.session:hover{
  transform:translateY(-1px);
}

.session-dot{

  width:10px;
  height:10px;

  border-radius:50%;

  background:var(--navy);

}

.session-info{
  flex:1;
}

.session-date{

  font-weight:700;

  font-size:15px;

}

.session-hours{

  margin-top:4px;

  font-size:13px;

  color:var(--text2);

}

.session-duration{

  font-size:22px;

  font-weight:700;

}

.session-actions{

  display:flex;

  gap:8px;

}

.action{

  width:36px;
  height:36px;

  border:none;

  border-radius:14px;

  cursor:pointer;

  transition:.15s;

}

.action:active{
  transform:scale(.9);
}

.edit{
  background:#edf2ff;
}

.delete{
  background:#ffe8e8;
}

/* =========================================================
PAGE TITLE
========================================================= */

.page-title{

  padding:24px 0 20px;

  text-align:center;

  font-size:30px;

  font-family:var(--font-serif);

}

/* =========================================================
CONTRAT
========================================================= */

.contract-card{

  padding:22px;

  margin-bottom:18px;

}

.contract-top{

  display:flex;
  justify-content:space-between;
  align-items:center;

}

.contract-badge{

  background:var(--gray);

  border-radius:30px;

  padding:8px 14px;

  font-size:12px;

  font-weight:700;

  color:var(--text2);

}

.solde-label{

  margin-top:24px;

  font-size:13px;

  color:var(--text2);

}

.solde-value{

  margin-top:6px;

  font-size:52px;

  font-weight:700;

  letter-spacing:-2px;

}

.solde-value.pos{
  color:var(--green);
}

.solde-value.neg{
  color:var(--accent);
}

.progress{

  margin-top:18px;

  height:10px;

  border-radius:30px;

  background:var(--gray2);

  overflow:hidden;

}

.progress-bar{

  width:0%;

  height:100%;

  border-radius:30px;

  background:
    linear-gradient(
      90deg,
      var(--navy),
      var(--navy3)
    );

  transition:.35s cubic-bezier(.4,0,.2,1);

}

/* =========================================================
SETTINGS
========================================================= */

.settings{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.setting{

  padding:18px;

}

.setting label{

  display:block;

  font-size:11px;

  text-transform:uppercase;

  letter-spacing:1px;

  font-weight:700;

  color:var(--text3);

  margin-bottom:10px;

}

.setting input{

  width:100%;

  border:none;

  background:var(--gray);

  padding:15px;

  border-radius:16px;

  font-size:16px;

  color:var(--text);

}

/* =========================================================
NAVBAR
========================================================= */

.nav{

  position:fixed;

  left:50%;
  transform:translateX(-50%);

  bottom:12px;

  width:calc(100% - 24px);
  max-width:406px;

  background:rgba(255,255,255,.72);

  backdrop-filter:blur(22px);

  border:1px solid rgba(255,255,255,.7);

  border-radius:28px;

  padding:12px 10px;

  display:flex;
  justify-content:space-around;

  box-shadow:
    0 10px 40px rgba(17,28,50,.12);

}

.nav-item{

  display:flex;
  flex-direction:column;
  align-items:center;

  gap:6px;

  cursor:pointer;

  color:var(--text3);

  font-size:11px;

  font-weight:600;

  transition:.2s;

}

.nav-item.active{
  color:var(--navy);
}

.nav-icon{

  width:42px;
  height:42px;

  border-radius:16px;

  display:flex;
  align-items:center;
  justify-content:center;

  transition:.2s;

}

.nav-item.active .nav-icon{

  background:rgba(20,33,61,.08);

}

.nav-icon svg{

  width:22px;
  height:22px;

  fill:currentColor;

}

/* =========================================================
MODAL
========================================================= */

.modal-overlay{

  position:fixed;
  inset:0;

  background:rgba(0,0,0,.45);

  display:none;

  align-items:flex-end;

  z-index:9999;

}

.modal-overlay.open{
  display:flex;
}

.modal{

  width:100%;
  max-width:430px;

  background:rgba(255,255,255,.92);

  backdrop-filter:blur(24px);

  border-radius:30px 30px 0 0;

  padding:24px 20px 40px;

  animation:modal .25s ease;

}

@keyframes modal{
  from{
    transform:translateY(100%);
  }
  to{
    transform:translateY(0);
  }
}

.modal-title{

  font-size:26px;

  font-family:var(--font-serif);

  margin-bottom:24px;

}

.field{
  margin-bottom:14px;
}

.field label{

  display:block;

  margin-bottom:6px;

  font-size:12px;

  font-weight:700;

  color:var(--text2);

  text-transform:uppercase;

}

.field input{

  width:100%;

  border:none;

  background:var(--gray);

  padding:15px;

  border-radius:16px;

  font-size:15px;

}

.modal-btns{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:12px;

  margin-top:24px;

}

/* =========================================================
TOAST
========================================================= */

.toast{

  position:fixed;

  top:20px;
  left:50%;

  transform:translateX(-50%);

  background:rgba(20,33,61,.95);

  color:#fff;

  padding:14px 24px;

  border-radius:30px;

  display:none;

  z-index:99999;

  box-shadow:var(--shadow-lg);

}

</style>
</head>

<body>

<!-- =========================================================
POINTAGE
========================================================= -->

<div class="view active"
     id="view-pointage">

  <div class="header">

    <div class="header-top">

      <div class="logo">

        <svg viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm.5 5h-1.5v6l5 3 .75-1.23-4.25-2.52z"/>
        </svg>

      </div>

      <div>

        <div class="brand-title">
          L'amusette
        </div>

        <div class="brand-sub">
          Estaminet
        </div>

      </div>

    </div>

    <div class="status">

      <div class="dot"
           id="dot"></div>

      <div class="status-text"
           id="statusText">

        Pas pointé

      </div>

      <div class="clock"
           id="clock">

        00:00

      </div>

    </div>

  </div>

  <!-- TIMER -->

  <div class="card timer-card">

    <div class="timer-state"
         id="timerState">

      PRÊT

    </div>

    <div class="timer"
         id="timer">

      0:00:00

    </div>

    <div class="timer-sub"
         id="timerSub">

      Appuie sur « Je pointe »

    </div>

    <div class="btns">

      <button class="btn btn-primary"
              id="startBtn"
              onclick="startShift()">

        Je pointe

      </button>

      <button class="btn btn-danger"
              id="stopBtn"
              onclick="stopShift()"
              disabled>

        Je dépointe

      </button>

    </div>

  </div>

  <!-- STATS -->

  <div class="stats">

    <div class="card stat blue">

      <div class="stat-label">
        Aujourd'hui
      </div>

      <div class="stat-value"
           id="todayStat">

        0h00

      </div>

    </div>

    <div class="card stat red">

      <div class="stat-label">
        Cette semaine
      </div>

      <div class="stat-value"
           id="weekStat">

        0h00

      </div>

    </div>

  </div>

</div>

<!-- =========================================================
HISTORIQUE
========================================================= -->

<div class="view"
     id="view-history">

  <div class="page-title">
    Historique
  </div>

  <div class="section-header">

    <div class="section-title">
      Sessions
    </div>

    <button class="add-btn"
            onclick="openModal()">

      <svg viewBox="0 0 24 24">
        <path d="M19 11H13V5h-2v6H5v2h6v6h2v-6h6z"/>
      </svg>

    </button>

  </div>

  <div class="sessions"
       id="sessions"></div>

</div>

<!-- =========================================================
CONTRAT
========================================================= -->

<div class="view"
     id="view-contract">

  <div class="page-title">
    Contrat
  </div>

  <div class="card contract-card">

    <div class="contract-top">

      <div>

        <div style="font-size:22px;font-weight:700">
          Solde actuel
        </div>

        <div style="
          font-size:13px;
          color:var(--text2);
          margin-top:4px;
        ">
          Heures supplémentaires / déficit
        </div>

      </div>

      <div class="contract-badge"
           id="contractBadge">

        39h / semaine

      </div>

    </div>

    <div class="solde-label">
      Balance contrat
    </div>

    <div class="solde-value"
         id="soldeValue">

      0h00

    </div>

    <div class="progress">
      <div class="progress-bar"
           id="progressBar"></div>
    </div>

  </div>

  <div class="settings">

    <div class="card setting">

      <label>
        Heures contrat / semaine
      </label>

      <input type="number"
             id="weeklyHoursInput"
             step="0.5">

    </div>

    <div class="card setting">

      <label>
        Solde actuel (heures)
      </label>

      <input type="number"
             id="balanceInput"
             step="0.5">

    </div>

    <button class="btn btn-primary"
            onclick="saveContract()">

      Sauvegarder

    </button>

  </div>

</div>

<!-- =========================================================
NAVBAR
========================================================= -->

<div class="nav">

  <div class="nav-item active"
       id="nav-pointage"
       onclick="goTo('pointage')">

    <div class="nav-icon">

      <svg viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm.5 5h-1.5v6l5 3 .75-1.23-4.25-2.52z"/>
      </svg>

    </div>

    <div>
      Pointage
    </div>

  </div>

  <div class="nav-item"
       id="nav-history"
       onclick="goTo('history')">

    <div class="nav-icon">

      <svg viewBox="0 0 24 24">
        <path d="M13 3a9 9 0 1 0 8.95 10h-2.02A7 7 0 1 1 13 5v4l5-5-5-5v4z"/>
      </svg>

    </div>

    <div>
      Historique
    </div>

  </div>

  <div class="nav-item"
       id="nav-contract"
       onclick="goTo('contract')">

    <div class="nav-icon">

      <svg viewBox="0 0 24 24">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5c0-1.1-.9-2-2-2zm-1 14H6v-2h12v2zm0-4H6v-2h12v2zm0-4H6V7h12v2z"/>
      </svg>

    </div>

    <div>
      Contrat
    </div>

  </div>

</div>

<!-- =========================================================
MODAL
========================================================= -->

<div class="modal-overlay"
     id="modalOverlay">

  <div class="modal">

    <div class="modal-title">
      Ajouter une session
    </div>

    <div class="field">

      <label>Date</label>

      <input type="date"
             id="mDate">

    </div>

    <div class="field">

      <label>Entrée</label>

      <input type="time"
             id="mStart">

    </div>

    <div class="field">

      <label>Sortie</label>

      <input type="time"
             id="mEnd">

    </div>

    <div class="modal-btns">

      <button class="btn"
              onclick="closeModal()">

        Annuler

      </button>

      <button class="btn btn-primary"
              onclick="saveModal()">

        Ajouter

      </button>

    </div>

  </div>

</div>

<div class="toast"
     id="toast"></div>

<script>

/* =========================================================
STATE
========================================================= */

let sessions =
JSON.parse(localStorage.getItem('premium_sessions') || '[]');

let current =
JSON.parse(localStorage.getItem('premium_current') || 'null');

let settings =
JSON.parse(localStorage.getItem('premium_settings') || 'null')
|| {
  weeklyHours:39,
  balance:0
};

let timerInterval=null;

/* =========================================================
NAVIGATION
========================================================= */

function goTo(view){

  document.querySelectorAll('.view')
    .forEach(v=>v.classList.remove('active'));

  document.querySelectorAll('.nav-item')
    .forEach(v=>v.classList.remove('active'));

  document
    .getElementById('view-'+view)
    .classList.add('active');

  document
    .getElementById('nav-'+view)
    .classList.add('active');

}

/* =========================================================
CLOCK
========================================================= */

function updateClock(){

  const now=new Date();

  document.getElementById('clock')
    .innerText=
      now.toLocaleTimeString(
        'fr-FR',
        {
          hour:'2-digit',
          minute:'2-digit'
        }
      );

}

setInterval(updateClock,1000);

updateClock();

/* =========================================================
POINTAGE
========================================================= */

function startShift(){

  if(current) return;

  current={
    start:new Date().toISOString()
  };

  localStorage.setItem(
    'premium_current',
    JSON.stringify(current)
  );

  startTimer();

  refresh();

  toast('Entrée pointée ✓');

}

function stopShift(){

  if(!current) return;

  const end=new Date();

  const sec=Math.floor(
    (end-new Date(current.start))/1000
  );

  sessions.unshift({

    id:Date.now(),

    start:current.start,

    end:end.toISOString(),

    duration:sec

  });

  saveSessions();

  current=null;

  localStorage.removeItem('premium_current');

  clearInterval(timerInterval);

  refresh();

  toast('Sortie pointée ✓');

}

function startTimer(){

  clearInterval(timerInterval);

  timerInterval=setInterval(()=>{

    if(!current) return;

    const sec=Math.floor(
      (Date.now()-new Date(current.start))/1000
    );

    document.getElementById('timer')
      .innerText=formatFull(sec);

  },1000);

}

/* =========================================================
REFRESH
========================================================= */

function refresh(){

  const running=!!current;

  document.getElementById('dot')
    .className='dot'+(running?' live':'');

  document.getElementById('statusText')
    .innerText=
      running
      ?'En cours'
      :'Pas pointé';

  document.getElementById('timerState')
    .className=
      'timer-state'+(running?' live':'');

  document.getElementById('timerState')
    .innerText=
      running
      ?'EN COURS'
      :'PRÊT';

  document.getElementById('startBtn')
    .disabled=running;

  document.getElementById('stopBtn')
    .disabled=!running;

  if(!running){

    document.getElementById('timer')
      .innerText='0:00:00';

    document.getElementById('timerSub')
      .innerText='Appuie sur « Je pointe »';

  }else{

    document.getElementById('timerSub')
      .innerText=
        'Depuis '
        +time(new Date(current.start));

  }

  updateStats();

  renderSessions();

  renderContract();

}

/* =========================================================
STATS
========================================================= */

function updateStats(){

  const today=dayTotal(new Date());

  const week=weekTotal();

  document.getElementById('todayStat')
    .innerText=formatShort(today);

  document.getElementById('weekStat')
    .innerText=formatShort(week);

}

/* =========================================================
CONTRACT
========================================================= */

function renderContract(){

  document.getElementById('weeklyHoursInput')
    .value=settings.weeklyHours;

  document.getElementById('balanceInput')
    .value=settings.balance;

  document.getElementById('contractBadge')
    .innerText=
      settings.weeklyHours+'h / semaine';

  const target=
    settings.weeklyHours*3600;

  const currentWeek=
    weekTotal();

  const diff=
    (settings.balance*3600)
    +(currentWeek-target);

  const el=
    document.getElementById('soldeValue');

  el.innerText=
    (diff>=0?'+':'−')
    +formatShort(Math.abs(diff));

  el.className=
    'solde-value '
    +(diff>=0?'pos':'neg');

  document.getElementById('progressBar')
    .style.width=
      Math.min(
        100,
        (currentWeek/target)*100
      )+'%';

}

function saveContract(){

  settings.weeklyHours=
    parseFloat(
      document.getElementById('weeklyHoursInput').value
    )||39;

  settings.balance=
    parseFloat(
      document.getElementById('balanceInput').value
    )||0;

  localStorage.setItem(
    'premium_settings',
    JSON.stringify(settings)
  );

  renderContract();

  toast('Contrat sauvegardé ✓');

}

/* =========================================================
SESSIONS
========================================================= */

function renderSessions(){

  const el=
    document.getElementById('sessions');

  if(!sessions.length){

    el.innerHTML=`
      <div style="
        text-align:center;
        padding:30px;
        color:var(--text3);
      ">
        Aucune session enregistrée
      </div>
    `;

    return;

  }

  let html='';

  sessions.forEach(s=>{

    const start=new Date(s.start);

    const end=new Date(s.end);

    html+=`

      <div class="session">

        <div class="session-dot"></div>

        <div class="session-info">

          <div class="session-date">
            ${dateFull(start)}
          </div>

          <div class="session-hours">
            ${time(start)}
            →
            ${time(end)}
          </div>

        </div>

        <div class="session-duration">
          ${formatShort(s.duration)}
        </div>

        <div class="session-actions">

          <button class="action edit"
                  onclick="editSession(${s.id})">

            ✏️

          </button>

          <button class="action delete"
                  onclick="deleteSession(${s.id})">

            🗑

          </button>

        </div>

      </div>

    `;

  });

  el.innerHTML=html;

}

function deleteSession(id){

  sessions=
    sessions.filter(s=>s.id!==id);

  saveSessions();

  refresh();

  toast('Session supprimée');

}

function editSession(id){

  const s=
    sessions.find(x=>x.id===id);

  if(!s) return;

  const hours=
    prompt(
      'Modifier durée en heures',
      (s.duration/3600).toFixed(2)
    );

  if(!hours) return;

  s.duration=
    Math.floor(
      parseFloat(hours)*3600
    );

  saveSessions();

  refresh();

  toast('Session modifiée ✓');

}

/* =========================================================
MODAL
========================================================= */

function openModal(){

  const now=new Date();

  document.getElementById('mDate')
    .value=
      now.toISOString().slice(0,10);

  document.getElementById('mStart')
    .value='09:00';

  document.getElementById('mEnd')
    .value='17:00';

  document.getElementById('modalOverlay')
    .classList.add('open');

}

function closeModal(){

  document.getElementById('modalOverlay')
    .classList.remove('open');

}

function saveModal(){

  const date=
    document.getElementById('mDate').value;

  const start=
    document.getElementById('mStart').value;

  const end=
    document.getElementById('mEnd').value;

  const startDate=
    new Date(date+'T'+start);

  const endDate=
    new Date(date+'T'+end);

  const sec=
    Math.floor(
      (endDate-startDate)/1000
    );

  sessions.unshift({

    id:Date.now(),

    start:startDate.toISOString(),

    end:endDate.toISOString(),

    duration:sec

  });

  saveSessions();

  closeModal();

  refresh();

  toast('Session ajoutée ✓');

}

/* =========================================================
SAVE
========================================================= */

function saveSessions(){

  localStorage.setItem(
    'premium_sessions',
    JSON.stringify(sessions)
  );

}

/* =========================================================
HELPERS
========================================================= */

function pad(n){
  return String(n).padStart(2,'0');
}

function time(d){

  return pad(d.getHours())
    +':'
    +pad(d.getMinutes());

}

function formatShort(sec){

  sec=Math.floor(sec);

  const h=Math.floor(sec/3600);

  const m=Math.floor((sec%3600)/60);

  return h+'h'+pad(m);

}

function formatFull(sec){

  sec=Math.floor(sec);

  const h=Math.floor(sec/3600);

  const m=Math.floor((sec%3600)/60);

  const s=sec%60;

  return h
    +':'
    +pad(m)
    +':'
    +pad(s);

}

function dateFull(d){

  const days=[
    'Dimanche',
    'Lundi',
    'Mardi',
    'Mercredi',
    'Jeudi',
    'Vendredi',
    'Samedi'
  ];

  return days[d.getDay()]
    +' '
    +pad(d.getDate())
    +'/'
    +pad(d.getMonth()+1);

}

function sameDay(a,b){

  return a.getDate()===b.getDate()
    && a.getMonth()===b.getMonth()
    && a.getFullYear()===b.getFullYear();

}

function dayTotal(date){

  let total=0;

  sessions.forEach(s=>{

    const d=new Date(s.start);

    if(sameDay(d,date)){
      total+=s.duration;
    }

  });

  return total;

}

function weekStart(date){

  const d=new Date(date);

  const day=d.getDay();

  const diff=
    d.getDate()
    -(day===0?6:day-1);

  d.setDate(diff);

  d.setHours(0,0,0,0);

  return d;

}

function weekTotal(){

  const start=
    weekStart(new Date());

  const end=
    new Date(start);

  end.setDate(end.getDate()+6);

  end.setHours(23,59,59,999);

  let total=0;

  sessions.forEach(s=>{

    const d=new Date(s.start);

    if(d>=start && d<=end){
      total+=s.duration;
    }

  });

  return total;

}

/* =========================================================
TOAST
========================================================= */

function toast(msg){

  const el=
    document.getElementById('toast');

  el.innerText=msg;

  el.style.display='block';

  clearTimeout(el._t);

  el._t=setTimeout(()=>{

    el.style.display='none';

  },2500);

}

/* =========================================================
INIT
========================================================= */

if(current){
  startTimer();
}

refresh();

</script>

</html>
