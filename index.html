<!-- =========================================================
ULTIMATE POINTEUSE — L'AMUSETTE
VERSION FULL PREMIUM
INDEX.HTML
========================================================= -->

<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>Pointeuse — L'amusette</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>

/* =========================================================
ROOT
========================================================= */

:root{

  --navy:#17243e;
  --navy2:#22345d;
  --navy3:#31487b;

  --red:#c0392b;
  --red2:#e74c3c;

  --green:#27ae60;

  --cream:#f7f4ef;
  --white:#ffffff;

  --gray:#efede8;
  --gray2:#e3dfd7;

  --text:#1b2846;
  --text2:#68738c;
  --text3:#9ca5b7;

  --radius:20px;

  --shadow:
    0 2px 12px rgba(17,28,50,.08),
    0 10px 26px rgba(17,28,50,.06);

  --shadow-lg:
    0 10px 40px rgba(17,28,50,.18);

  --font:'DM Sans',sans-serif;
  --font-serif:'DM Serif Display',serif;

}

/* =========================================================
GLOBAL
========================================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{

  background:var(--cream);

  color:var(--text);

  font-family:var(--font);

  max-width:430px;

  margin:auto;

  min-height:100vh;

  padding-bottom:120px;

}

button,input{
  font-family:var(--font);
}

/* =========================================================
VIEW
========================================================= */

.view{
  display:none;
  padding:0 16px 20px;
}

.view.active{
  display:block;
}

/* =========================================================
HEADER
========================================================= */

.header{

  margin:0 -16px 22px;

  padding:22px;

  background:
    linear-gradient(
      135deg,
      var(--navy),
      var(--navy2)
    );

  color:#fff;

  overflow:hidden;

  position:relative;

}

.header::before{

  content:'';

  position:absolute;

  width:150px;
  height:150px;

  border-radius:50%;

  background:rgba(255,255,255,.04);

  right:-40px;
  top:-50px;

}

.header-top{

  display:flex;

  align-items:center;

  gap:14px;

  position:relative;

  z-index:2;

}

.logo{

  width:58px;
  height:58px;

  border-radius:18px;

  background:
    linear-gradient(
      135deg,
      var(--red),
      var(--red2)
    );

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:28px;

  box-shadow:var(--shadow-lg);

}

.brand-title{

  font-size:28px;

  font-family:var(--font-serif);

}

.brand-sub{

  margin-top:2px;

  font-size:11px;

  letter-spacing:2px;

  text-transform:uppercase;

  color:rgba(255,255,255,.55);

}

.status{

  margin-top:20px;

  display:flex;
  align-items:center;

  gap:8px;

  position:relative;
  z-index:2;

}

.dot{

  width:10px;
  height:10px;

  border-radius:50%;

  background:rgba(255,255,255,.3);

}

.dot.live{

  background:var(--green);

  animation:pulse 1.6s infinite;

}

@keyframes pulse{

  0%{
    box-shadow:0 0 0 0 rgba(39,174,96,.5)
  }

  70%{
    box-shadow:0 0 0 8px rgba(39,174,96,0)
  }

  100%{
    box-shadow:0 0 0 0 rgba(39,174,96,0)
  }

}

.status-text{
  font-size:13px;
  color:rgba(255,255,255,.8);
}

.clock{

  margin-left:auto;

  font-size:13px;

  color:rgba(255,255,255,.45);

}

/* =========================================================
CARDS
========================================================= */

.card{

  background:#fff;

  border-radius:var(--radius);

  box-shadow:var(--shadow);

}

/* =========================================================
TIMER
========================================================= */

.timer-card{

  padding:26px 20px;

  text-align:center;

  margin-bottom:16px;

}

.timer-state{

  font-size:12px;

  font-weight:700;

  letter-spacing:2px;

  text-transform:uppercase;

  color:var(--text3);

}

.timer-state.live{
  color:var(--green);
}

.timer{

  margin-top:8px;

  font-size:64px;

  font-weight:700;

  letter-spacing:-3px;

}

.timer-sub{

  margin-top:10px;

  font-size:14px;

  color:var(--text2);

}

.btns{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:12px;

  margin-top:24px;

}

.btn{

  border:none;

  border-radius:16px;

  padding:16px;

  cursor:pointer;

  font-weight:700;

  transition:.15s;

}

.btn:active{
  transform:scale(.97);
}

.btn-primary{

  background:
    linear-gradient(
      135deg,
      var(--navy),
      var(--navy3)
    );

  color:#fff;

}

.btn-danger{

  background:
    linear-gradient(
      135deg,
      var(--red),
      var(--red2)
    );

  color:#fff;

}

.btn:disabled{
  opacity:.4;
}

/* =========================================================
MINI STATS
========================================================= */

.stats{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:12px;

  margin-bottom:16px;

}

.stat{

  padding:18px;

  position:relative;

  overflow:hidden;

}

.stat::after{

  content:'';

  position:absolute;

  left:0;
  right:0;
  bottom:0;

  height:4px;

}

.stat.blue::after{
  background:var(--navy);
}

.stat.red::after{
  background:var(--red);
}

.stat-label{

  font-size:11px;

  text-transform:uppercase;

  letter-spacing:1px;

  font-weight:700;

  color:var(--text3);

}

.stat-value{

  margin-top:8px;

  font-size:30px;

  font-weight:700;

}

/* =========================================================
CONTRAT
========================================================= */

.contract{

  padding:18px;

  margin-bottom:18px;

}

.contract-top{

  display:flex;
  justify-content:space-between;
  align-items:center;

}

.contract-badge{

  background:var(--gray);

  padding:6px 12px;

  border-radius:30px;

  font-size:12px;

  font-weight:700;

  color:var(--text2);

}

.contract-solde{

  margin-top:18px;

}

.contract-solde-label{

  font-size:13px;

  color:var(--text2);

}

.contract-solde-value{

  margin-top:6px;

  font-size:40px;

  font-weight:700;

}

.contract-solde-value.pos{
  color:var(--green);
}

.contract-solde-value.neg{
  color:var(--red);
}

.progress{

  margin-top:18px;

  height:8px;

  border-radius:30px;

  overflow:hidden;

  background:var(--gray2);

}

.progress-bar{

  height:100%;

  width:0%;

  background:
    linear-gradient(
      90deg,
      var(--navy),
      var(--navy3)
    );

}

/* =========================================================
SECTION
========================================================= */

.section-header{

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:12px;

}

.section-title{

  font-size:20px;

  font-weight:700;

}

.add-btn{

  width:38px;
  height:38px;

  border:none;

  border-radius:50%;

  background:
    linear-gradient(
      135deg,
      var(--navy),
      var(--navy3)
    );

  color:#fff;

  font-size:22px;

  cursor:pointer;

}

/* =========================================================
SESSIONS
========================================================= */

.sessions{

  display:flex;
  flex-direction:column;

  gap:10px;

}

.session{

  background:#fff;

  border-radius:18px;

  padding:16px;

  box-shadow:var(--shadow);

  display:flex;
  align-items:center;

  gap:12px;

}

.session-dot{

  width:10px;
  height:10px;

  border-radius:50%;

  background:var(--navy);

}

.session-info{
  flex:1;
}

.session-date{
  font-weight:700;
}

.session-hours{

  margin-top:4px;

  font-size:13px;

  color:var(--text2);

}

.session-duration{

  font-size:20px;

  font-weight:700;

}

.session-actions{

  display:flex;

  gap:8px;

}

.action{

  width:34px;
  height:34px;

  border:none;

  border-radius:12px;

  cursor:pointer;

}

.edit{
  background:#edf2ff;
}

.delete{
  background:#ffe7e7;
}

/* =========================================================
PAGE TITLE
========================================================= */

.page-title{

  padding:20px 0 18px;

  text-align:center;

  font-size:28px;

  font-family:var(--font-serif);

}

/* =========================================================
SETTINGS
========================================================= */

.settings{

  display:flex;
  flex-direction:column;

  gap:14px;

}

.setting{

  background:#fff;

  border-radius:18px;

  padding:18px;

  box-shadow:var(--shadow);

}

.setting label{

  display:block;

  font-size:12px;

  text-transform:uppercase;

  letter-spacing:1px;

  font-weight:700;

  color:var(--text3);

  margin-bottom:8px;

}

.setting input{

  width:100%;

  border:none;

  background:var(--gray);

  padding:14px;

  border-radius:14px;

  font-size:16px;

}

/* =========================================================
NAV
========================================================= */

.nav{

  position:fixed;

  bottom:0;

  left:50%;

  transform:translateX(-50%);

  width:100%;
  max-width:430px;

  background:rgba(255,255,255,.96);

  backdrop-filter:blur(20px);

  border-top:1px solid var(--gray2);

  display:flex;

  justify-content:space-around;

  padding:10px 0 24px;

}

.nav-item{

  display:flex;
  flex-direction:column;
  align-items:center;

  gap:6px;

  cursor:pointer;

  color:var(--text3);

  font-size:11px;

  font-weight:600;

}

.nav-item.active{
  color:var(--navy);
}

.nav-icon{

  width:36px;
  height:36px;

  border-radius:12px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:20px;

}

.nav-item.active .nav-icon{
  background:rgba(23,36,62,.08);
}

/* =========================================================
MODAL
========================================================= */

.modal-overlay{

  position:fixed;
  inset:0;

  background:rgba(0,0,0,.45);

  display:none;

  align-items:flex-end;

  z-index:999;

}

.modal-overlay.open{
  display:flex;
}

.modal{

  width:100%;
  max-width:430px;

  background:#fff;

  border-radius:28px 28px 0 0;

  padding:24px 20px 40px;

}

.modal-title{

  font-size:24px;

  font-family:var(--font-serif);

  margin-bottom:22px;

}

.field{
  margin-bottom:14px;
}

.field label{

  display:block;

  margin-bottom:6px;

  font-size:12px;

  font-weight:700;

  text-transform:uppercase;

  color:var(--text2);

}

.field input{

  width:100%;

  padding:14px;

  border:none;

  background:var(--gray);

  border-radius:14px;

}

.modal-btns{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:12px;

  margin-top:22px;

}

/* =========================================================
TOAST
========================================================= */

.toast{

  position:fixed;

  top:20px;
  left:50%;

  transform:translateX(-50%);

  background:rgba(23,36,62,.96);

  color:#fff;

  padding:14px 24px;

  border-radius:30px;

  display:none;

  z-index:9999;

}

</style>
</head>

<body>

<!-- =========================================================
POINTAGE
========================================================= -->

<div class="view active"
     id="view-pointage">

  <div class="header">

    <div class="header-top">

      <div class="logo">
        ⏱
      </div>

      <div>

        <div class="brand-title">
          L'amusette
        </div>

        <div class="brand-sub">
          Estaminet
        </div>

      </div>

    </div>

    <div class="status">

      <div class="dot"
           id="dot"></div>

      <div class="status-text"
           id="statusText">

        Pas pointé

      </div>

      <div class="clock"
           id="clock">

        00:00

      </div>

    </div>

  </div>

  <div class="card timer-card">

    <div class="timer-state"
         id="timerState">

      PRÊT

    </div>

    <div class="timer"
         id="timer">

      0:00:00

    </div>

    <div class="timer-sub"
         id="timerSub">

      Appuie sur « Je pointe »

    </div>

    <div class="btns">

      <button class="btn btn-primary"
              id="startBtn"
              onclick="startShift()">

        Je pointe

      </button>

      <button class="btn btn-danger"
              id="stopBtn"
              onclick="stopShift()"
              disabled>

        Je dépointe

      </button>

    </div>

  </div>

  <div class="stats">

    <div class="card stat blue">

      <div class="stat-label">
        Aujourd'hui
      </div>

      <div class="stat-value"
           id="todayStat">

        0h00

      </div>

    </div>

    <div class="card stat red">

      <div class="stat-label">
        Semaine
      </div>

      <div class="stat-value"
           id="weekStat">

        0h00

      </div>

    </div>

  </div>

</div>

<!-- =========================================================
HISTORIQUE
========================================================= -->

<div class="view"
     id="view-history">

  <div class="page-title">
    Historique
  </div>

  <div class="section-header">

    <div class="section-title">
      Sessions
    </div>

    <button class="add-btn"
            onclick="openModal()">

      +

    </button>

  </div>

  <div class="sessions"
       id="sessions">

  </div>

</div>

<!-- =========================================================
CONTRAT
========================================================= -->

<div class="view"
     id="view-contract">

  <div class="page-title">
    Contrat
  </div>

  <div class="card contract">

    <div class="contract-top">

      <div>

        <div style="font-size:20px;font-weight:700">
          Contrat actuel
        </div>

        <div style="
          font-size:13px;
          color:var(--text2);
          margin-top:3px;
        ">
          Heures supplémentaires / déficit
        </div>

      </div>

      <div class="contract-badge"
           id="contractBadge">

        39h / semaine

      </div>

    </div>

    <div class="contract-solde">

      <div class="contract-solde-label">
        Solde actuel
      </div>

      <div class="contract-solde-value"
           id="soldeValue">

        0h00

      </div>

    </div>

    <div class="progress">

      <div class="progress-bar"
           id="progressBar"></div>

    </div>

  </div>

  <div class="settings">

    <div class="setting">

      <label>
        Heures contrat / semaine
      </label>

      <input type="number"
             id="weeklyHoursInput"
             step="0.5">

    </div>

    <div class="setting">

      <label>
        Solde actuel (heures)
      </label>

      <input type="number"
             id="balanceInput"
             step="0.5">

    </div>

    <button class="btn btn-primary"
            onclick="saveContract()">

      Sauvegarder

    </button>

  </div>

</div>

<!-- =========================================================
NAV
========================================================= -->

<div class="nav">

  <div class="nav-item active"
       onclick="goTo('pointage')"
       id="nav-pointage">

    <div class="nav-icon">
      ⏱
    </div>

    <div>
      Pointage
    </div>

  </div>

  <div class="nav-item"
       onclick="goTo('history')"
       id="nav-history">

    <div class="nav-icon">
      📚
    </div>

    <div>
      Historique
    </div>

  </div>

  <div class="nav-item"
       onclick="goTo('contract')"
       id="nav-contract">

    <div class="nav-icon">
      📄
    </div>

    <div>
      Contrat
    </div>

  </div>

</div>

<!-- =========================================================
MODAL
========================================================= -->

<div class="modal-overlay"
     id="modalOverlay">

  <div class="modal">

    <div class="modal-title">
      Ajouter une session
    </div>

    <div class="field">

      <label>Date</label>

      <input type="date"
             id="mDate">

    </div>

    <div class="field">

      <label>Entrée</label>

      <input type="time"
             id="mStart">

    </div>

    <div class="field">

      <label>Sortie</label>

      <input type="time"
             id="mEnd">

    </div>

    <div class="modal-btns">

      <button class="btn"
              onclick="closeModal()">

        Annuler

      </button>

      <button class="btn btn-primary"
              onclick="saveModal()">

        Ajouter

      </button>

    </div>

  </div>

</div>

<div class="toast"
     id="toast"></div>

<script>

/* =========================================================
STATE
========================================================= */

let sessions=
JSON.parse(localStorage.getItem('ultimate_sessions')||'[]');

let current=
JSON.parse(localStorage.getItem('ultimate_current')||'null');

let settings=
JSON.parse(localStorage.getItem('ultimate_settings')||'null')
||{
  weeklyHours:39,
  balance:0
};

let timerInterval=null;

/* =========================================================
NAVIGATION
========================================================= */

function goTo(view){

  document.querySelectorAll('.view')
    .forEach(v=>v.classList.remove('active'));

  document.querySelectorAll('.nav-item')
    .forEach(v=>v.classList.remove('active'));

  document
    .getElementById('view-'+view)
    .classList.add('active');

  document
    .getElementById('nav-'+view)
    .classList.add('active');

}

/* =========================================================
CLOCK
========================================================= */

function updateClock(){

  const now=new Date();

  document.getElementById('clock')
    .innerText=
      now.toLocaleTimeString(
        'fr-FR',
        {
          hour:'2-digit',
          minute:'2-digit'
        }
      );

}

setInterval(updateClock,1000);

updateClock();

/* =========================================================
POINTAGE
========================================================= */

function startShift(){

  if(current) return;

  current={
    start:new Date().toISOString()
  };

  localStorage.setItem(
    'ultimate_current',
    JSON.stringify(current)
  );

  startTimer();

  refresh();

  toast('Entrée pointée ✓');

}

function stopShift(){

  if(!current) return;

  const end=new Date();

  const sec=Math.floor(
    (end-new Date(current.start))/1000
  );

  sessions.unshift({

    id:Date.now(),

    start:current.start,

    end:end.toISOString(),

    duration:sec

  });

  saveSessions();

  current=null;

  localStorage.removeItem('ultimate_current');

  clearInterval(timerInterval);

  refresh();

  toast('Sortie pointée ✓');

}

function startTimer(){

  clearInterval(timerInterval);

  timerInterval=setInterval(()=>{

    if(!current) return;

    const sec=Math.floor(
      (Date.now()-new Date(current.start))/1000
    );

    document.getElementById('timer')
      .innerText=formatFull(sec);

  },1000);

}

/* =========================================================
REFRESH
========================================================= */

function refresh(){

  const running=!!current;

  document.getElementById('dot')
    .className='dot'+(running?' live':'');

  document.getElementById('statusText')
    .innerText=
      running
      ?'En cours'
      :'Pas pointé';

  document.getElementById('timerState')
    .className=
      'timer-state'+(running?' live':'');

  document.getElementById('timerState')
    .innerText=
      running
      ?'EN COURS'
      :'PRÊT';

  document.getElementById('startBtn')
    .disabled=running;

  document.getElementById('stopBtn')
    .disabled=!running;

  if(!running){

    document.getElementById('timer')
      .innerText='0:00:00';

    document.getElementById('timerSub')
      .innerText='Appuie sur « Je pointe »';

  }else{

    document.getElementById('timerSub')
      .innerText=
        'Depuis '
        +time(new Date(current.start));

  }

  updateStats();

  renderSessions();

  renderContract();

}

/* =========================================================
STATS
========================================================= */

function updateStats(){

  const today=dayTotal(new Date());

  const week=weekTotal();

  document.getElementById('todayStat')
    .innerText=formatShort(today);

  document.getElementById('weekStat')
    .innerText=formatShort(week);

}

/* =========================================================
CONTRACT
========================================================= */

function renderContract(){

  document.getElementById('weeklyHoursInput')
    .value=settings.weeklyHours;

  document.getElementById('balanceInput')
    .value=settings.balance;

  document.getElementById('contractBadge')
    .innerText=
      settings.weeklyHours+'h / semaine';

  const target=
    settings.weeklyHours*3600;

  const currentWeek=
    weekTotal();

  const diff=
    (settings.balance*3600)
    +(currentWeek-target);

  const el=
    document.getElementById('soldeValue');

  el.innerText=
    (diff>=0?'+':'-')
    +formatShort(Math.abs(diff));

  el.className=
    'contract-solde-value '
    +(diff>=0?'pos':'neg');

  document.getElementById('progressBar')
    .style.width=
      Math.min(
        100,
        (currentWeek/target)*100
      )+'%';

}

function saveContract(){

  settings.weeklyHours=
    parseFloat(
      document.getElementById('weeklyHoursInput').value
    )||39;

  settings.balance=
    parseFloat(
      document.getElementById('balanceInput').value
    )||0;

  localStorage.setItem(
    'ultimate_settings',
    JSON.stringify(settings)
  );

  renderContract();

  toast('Contrat sauvegardé ✓');

}

/* =========================================================
SESSIONS
========================================================= */

function renderSessions(){

  const el=
    document.getElementById('sessions');

  if(!sessions.length){

    el.innerHTML=`
      <div style="
        text-align:center;
        color:var(--text3);
        padding:30px;
      ">
        Aucune session
      </div>
    `;

    return;

  }

  let html='';

  sessions.forEach(s=>{

    const start=new Date(s.start);

    const end=new Date(s.end);

    html+=`

      <div class="session">

        <div class="session-dot"></div>

        <div class="session-info">

          <div class="session-date">
            ${dateFull(start)}
          </div>

          <div class="session-hours">
            ${time(start)}
            →
            ${time(end)}
          </div>

        </div>

        <div class="session-duration">
          ${formatShort(s.duration)}
        </div>

        <div class="session-actions">

          <button class="action edit"
                  onclick="editSession(${s.id})">

            ✏️

          </button>

          <button class="action delete"
                  onclick="deleteSession(${s.id})">

            🗑

          </button>

        </div>

      </div>

    `;

  });

  el.innerHTML=html;

}

function deleteSession(id){

  sessions=
    sessions.filter(s=>s.id!==id);

  saveSessions();

  refresh();

  toast('Session supprimée');

}

function editSession(id){

  const s=
    sessions.find(x=>x.id===id);

  if(!s) return;

  const hours=
    prompt(
      'Modifier durée en heures',
      (s.duration/3600).toFixed(2)
    );

  if(!hours) return;

  s.duration=
    Math.floor(
      parseFloat(hours)*3600
    );

  saveSessions();

  refresh();

  toast('Session modifiée ✓');

}

/* =========================================================
MODAL
========================================================= */

function openModal(){

  const now=new Date();

  document.getElementById('mDate')
    .value=
      now.toISOString().slice(0,10);

  document.getElementById('mStart')
    .value='09:00';

  document.getElementById('mEnd')
    .value='17:00';

  document.getElementById('modalOverlay')
    .classList.add('open');

}

function closeModal(){

  document.getElementById('modalOverlay')
    .classList.remove('open');

}

function saveModal(){

  const date=
    document.getElementById('mDate').value;

  const start=
    document.getElementById('mStart').value;

  const end=
    document.getElementById('mEnd').value;

  const startDate=
    new Date(date+'T'+start);

  const endDate=
    new Date(date+'T'+end);

  const sec=Math.floor(
    (endDate-startDate)/1000
  );

  sessions.unshift({

    id:Date.now(),

    start:startDate.toISOString(),

    end:endDate.toISOString(),

    duration:sec

  });

  saveSessions();

  closeModal();

  refresh();

  toast('Session ajoutée ✓');

}

/* =========================================================
SAVE
========================================================= */

function saveSessions(){

  localStorage.setItem(
    'ultimate_sessions',
    JSON.stringify(sessions)
  );

}

/* =========================================================
HELPERS
========================================================= */

function pad(n){
  return String(n).padStart(2,'0');
}

function time(d){

  return pad(d.getHours())
    +':'
    +pad(d.getMinutes());

}

function formatShort(sec){

  sec=Math.floor(sec);

  const h=Math.floor(sec/3600);

  const m=Math.floor((sec%3600)/60);

  return h+'h'+pad(m);

}

function formatFull(sec){

  sec=Math.floor(sec);

  const h=Math.floor(sec/3600);

  const m=Math.floor((sec%3600)/60);

  const s=sec%60;

  return h
    +':'
    +pad(m)
    +':'
    +pad(s);

}

function dateFull(d){

  const days=[
    'Dimanche',
    'Lundi',
    'Mardi',
    'Mercredi',
    'Jeudi',
    'Vendredi',
    'Samedi'
  ];

  return days[d.getDay()]
    +' '
    +pad(d.getDate())
    +'/'
    +pad(d.getMonth()+1);

}

function sameDay(a,b){

  return a.getDate()===b.getDate()
    && a.getMonth()===b.getMonth()
    && a.getFullYear()===b.getFullYear();

}

function dayTotal(date){

  let total=0;

  sessions.forEach(s=>{

    const d=new Date(s.start);

    if(sameDay(d,date)){
      total+=s.duration;
    }

  });

  return total;

}

function weekStart(date){

  const d=new Date(date);

  const day=d.getDay();

  const diff=
    d.getDate()
    -(day===0?6:day-1);

  d.setDate(diff);

  d.setHours(0,0,0,0);

  return d;

}

function weekTotal(){

  const start=
    weekStart(new Date());

  const end=
    new Date(start);

  end.setDate(end.getDate()+6);

  end.setHours(23,59,59,999);

  let total=0;

  sessions.forEach(s=>{

    const d=new Date(s.start);

    if(d>=start && d<=end){
      total+=s.duration;
    }

  });

  return total;

}

/* =========================================================
TOAST
========================================================= */

function toast(msg){

  const el=
    document.getElementById('toast');

  el.innerText=msg;

  el.style.display='block';

  clearTimeout(el._t);

  el._t=setTimeout(()=>{

    el.style.display='none';

  },2500);

}

/* =========================================================
INIT
========================================================= */

if(current){
  startTimer();
}

refresh();

</script>
