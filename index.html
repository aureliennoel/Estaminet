<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>L'amusette — Pointeuse</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap"
      rel="stylesheet">

<style>

/* =========================================================
ROOT
========================================================= */

:root{

  --navy:#10203a;
  --navy2:#1c3157;
  --navy3:#304878;

  --accent:#b42318;
  --accent2:#d62828;

  --green:#1fa971;

  --cream:#f8f5f1;
  --cream2:#f2eee8;

  --white:#ffffff;

  --gray:#ece7e0;
  --gray2:#ddd7ce;

  --text:#17253f;
  --text2:#6f7b92;
  --text3:#a0a8b8;

  --radius:28px;

  --shadow:
    0 8px 24px rgba(15,23,42,.06);

  --shadow-lg:
    0 18px 44px rgba(15,23,42,.14);

  --font:'DM Sans',sans-serif;
  --font-serif:'DM Serif Display',serif;

}

/* =========================================================
GLOBAL
========================================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  scroll-behavior:smooth;
}

body{

  background:
    linear-gradient(
      180deg,
      var(--cream),
      var(--cream2)
    );

  color:var(--text);

  font-family:var(--font);

  max-width:430px;

  margin:auto;

  min-height:100vh;

  padding-bottom:120px;

}

button,input{
  font-family:var(--font);
}

button{
  border:none;
  cursor:pointer;
}

input{
  outline:none;
}

/* =========================================================
VIEW
========================================================= */

.view{
  display:none;
  padding:0 18px 30px;
  animation:fade .22s ease;
}

.view.active{
  display:block;
}

@keyframes fade{

  from{
    opacity:0;
    transform:translateY(8px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

/* =========================================================
HEADER
========================================================= */

.header{

  margin:0 -18px 28px;

  padding:28px 22px 34px;

  border-radius:
    0 0 36px 36px;

  background:
    linear-gradient(
      145deg,
      var(--navy),
      var(--navy2)
    );

  position:relative;

  overflow:hidden;

  box-shadow:
    0 12px 40px rgba(16,32,58,.22);

}

.header::before{

  content:'';

  position:absolute;

  width:220px;
  height:220px;

  border-radius:50%;

  background:
    rgba(255,255,255,.04);

  top:-110px;
  right:-70px;

}

.header::after{

  content:'';

  position:absolute;

  width:120px;
  height:120px;

  border-radius:50%;

  background:
    rgba(214,40,40,.10);

  left:-20px;
  bottom:-50px;

}

.header-top{

  display:flex;
  align-items:center;
  gap:16px;

  position:relative;
  z-index:2;

}

.logo{

  width:70px;
  height:70px;

  border-radius:24px;

  background:
    linear-gradient(
      145deg,
      var(--accent),
      var(--accent2)
    );

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:32px;

  box-shadow:
    0 10px 28px rgba(214,40,40,.28);

}

.brand-title{

  font-size:32px;

  color:white;

  font-family:var(--font-serif);

}

.brand-sub{

  margin-top:4px;

  font-size:11px;

  text-transform:uppercase;

  letter-spacing:2px;

  color:
    rgba(255,255,255,.52);

}

.status{

  margin-top:24px;

  display:flex;
  align-items:center;
  gap:8px;

  position:relative;
  z-index:2;

}

.dot{

  width:10px;
  height:10px;

  border-radius:50%;

  background:
    rgba(255,255,255,.25);

}

.dot.live{

  background:var(--green);

  animation:pulse 1.8s infinite;

}

@keyframes pulse{

  0%{
    box-shadow:0 0 0 0 rgba(31,169,113,.5);
  }

  70%{
    box-shadow:0 0 0 8px rgba(31,169,113,0);
  }

  100%{
    box-shadow:0 0 0 0 rgba(31,169,113,0);
  }

}

.status-text{

  color:
    rgba(255,255,255,.84);

  font-size:13px;

}

.clock{

  margin-left:auto;

  font-size:13px;

  color:
    rgba(255,255,255,.45);

}

/* =========================================================
CARD
========================================================= */

.card{

  background:
    rgba(255,255,255,.82);

  backdrop-filter:blur(20px);

  border:
    1px solid rgba(255,255,255,.66);

  border-radius:var(--radius);

  box-shadow:var(--shadow);

}

/* =========================================================
TIMER
========================================================= */

.timer-card{

  padding:34px 24px;

  text-align:center;

  margin-bottom:18px;

  position:relative;

  overflow:hidden;

}

.timer-card::before{

  content:'';

  position:absolute;

  top:0;
  left:0;
  right:0;

  height:5px;

  background:
    linear-gradient(
      90deg,
      var(--navy),
      var(--accent2)
    );

}

.timer-state{

  font-size:11px;

  font-weight:700;

  letter-spacing:2px;

  text-transform:uppercase;

  color:var(--text3);

}

.timer-state.live{
  color:var(--green);
}

.timer{

  margin-top:12px;

  font-size:72px;

  font-weight:700;

  letter-spacing:-4px;

}

.timer-sub{

  margin-top:10px;

  color:var(--text2);

  font-size:14px;

}

.btns{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:12px;

  margin-top:26px;

}

.btn{

  padding:18px;

  border-radius:22px;

  font-size:15px;

  font-weight:700;

  transition:.2s;

}

.btn:active{
  transform:scale(.96);
}

.btn-primary{

  background:
    linear-gradient(
      145deg,
      var(--navy),
      var(--navy3)
    );

  color:white;

}

.btn-danger{

  background:
    linear-gradient(
      145deg,
      var(--accent),
      var(--accent2)
    );

  color:white;

}

.btn:disabled{
  opacity:.35;
}

/* =========================================================
STATS
========================================================= */

.stats{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:14px;

  margin-bottom:18px;

}

.stat{

  padding:20px;

  position:relative;

  overflow:hidden;

}

.stat::after{

  content:'';

  position:absolute;

  left:0;
  right:0;
  bottom:0;

  height:4px;

}

.stat.blue::after{
  background:var(--navy);
}

.stat.red::after{
  background:var(--accent2);
}

.stat-label{

  font-size:11px;

  font-weight:700;

  letter-spacing:1px;

  text-transform:uppercase;

  color:var(--text3);

}

.stat-value{

  margin-top:12px;

  font-size:34px;

  font-weight:700;

}

/* =========================================================
SECTION
========================================================= */

.section-header{

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:14px;

}

.section-title{

  font-size:24px;

  font-weight:700;

}

.add-btn{

  width:54px;
  height:54px;

  border-radius:20px;

  background:
    linear-gradient(
      145deg,
      var(--navy),
      var(--navy3)
    );

  color:white;

  font-size:24px;

}

/* =========================================================
SESSIONS
========================================================= */

.sessions{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.session{

  background:
    rgba(255,255,255,.84);

  border-radius:26px;

  padding:18px;

  display:flex;
  align-items:center;
  gap:14px;

  box-shadow:
    0 8px 24px rgba(15,23,42,.06);

}

.session-dot{

  width:12px;
  height:12px;

  border-radius:50%;

  background:
    linear-gradient(
      145deg,
      var(--navy),
      var(--navy3)
    );

}

.session-info{
  flex:1;
}

.session-date{

  font-size:15px;

  font-weight:700;

}

.session-hours{

  margin-top:5px;

  font-size:13px;

  color:var(--text2);

}

.session-duration{

  font-size:22px;

  font-weight:700;

}

.session-actions{
  display:flex;
  gap:8px;
}

.action{

  width:38px;
  height:38px;

  border-radius:14px;

  font-size:15px;

}

.edit{
  background:#eef2ff;
}

.delete{
  background:#ffe9e9;
}

/* =========================================================
PAGE TITLE
========================================================= */

.page-title{

  padding:24px 0 22px;

  text-align:center;

  font-size:32px;

  font-family:var(--font-serif);

}

/* =========================================================
CONTRACT
========================================================= */

.contract-card{

  padding:26px;

  margin-bottom:18px;

  border-radius:32px;

  background:
    linear-gradient(
      145deg,
      var(--navy),
      var(--navy2)
    );

  color:white;

}

.contract-top{

  display:flex;
  justify-content:space-between;
  align-items:center;

}

.contract-badge{

  background:
    rgba(255,255,255,.10);

  padding:8px 14px;

  border-radius:30px;

  font-size:12px;

  font-weight:700;

}

.solde-label{

  margin-top:24px;

  font-size:13px;

  color:
    rgba(255,255,255,.62);

}

.solde-value{

  margin-top:14px;

  font-size:58px;

  font-weight:700;

  letter-spacing:-3px;

}

.progress{

  margin-top:22px;

  height:12px;

  border-radius:30px;

  background:
    rgba(255,255,255,.12);

  overflow:hidden;

}

.progress-bar{

  width:0%;

  height:100%;

  border-radius:30px;

  background:white;

}

/* =========================================================
SETTINGS
========================================================= */

.settings{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.setting{
  padding:18px;
}

.setting label{

  display:block;

  margin-bottom:10px;

  font-size:11px;

  font-weight:700;

  text-transform:uppercase;

  color:var(--text3);

}

.setting input{

  width:100%;

  background:var(--gray);

  border:none;

  border-radius:18px;

  padding:16px;

  font-size:16px;

}

/* =========================================================
NAVBAR
========================================================= */

.nav{

  position:fixed;

  left:50%;
  transform:translateX(-50%);

  bottom:14px;

  width:calc(100% - 24px);
  max-width:406px;

  padding:12px 10px 18px;

  border-radius:34px;

  background:
    rgba(255,255,255,.74);

  backdrop-filter:blur(26px);

  display:flex;
  justify-content:space-around;

  box-shadow:
    0 12px 40px rgba(17,24,39,.12);

}

.nav-item{

  flex:1;

  display:flex;
  flex-direction:column;
  align-items:center;

  gap:6px;

  color:var(--text3);

  cursor:pointer;

}

.nav-item.active{
  color:var(--navy);
}

.nav-icon{

  width:54px;
  height:54px;

  border-radius:18px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:24px;

}

.nav-item.active .nav-icon{

  background:
    rgba(16,32,58,.08);

}

.nav-label{

  font-size:11px;

  font-weight:700;

}

/* =========================================================
MODAL
========================================================= */

.modal-overlay{

  position:fixed;
  inset:0;

  background:
    rgba(0,0,0,.42);

  display:none;

  align-items:flex-end;

}

.modal-overlay.open{
  display:flex;
}

.modal{

  width:100%;
  max-width:430px;

  background:white;

  border-radius:
    34px 34px 0 0;

  padding:
    26px 22px 42px;

}

.modal-title{

  font-size:28px;

  font-family:var(--font-serif);

  margin-bottom:22px;

}

.field{
  margin-bottom:14px;
}

.field label{

  display:block;

  margin-bottom:6px;

  font-size:12px;

  font-weight:700;

  color:var(--text2);

}

.field input{

  width:100%;

  background:var(--gray);

  border:none;

  border-radius:18px;

  padding:16px;

  font-size:15px;

}

.modal-btns{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:12px;

  margin-top:24px;

}

/* =========================================================
TOAST
========================================================= */

.toast{

  position:fixed;

  top:20px;

  left:50%;

  transform:translateX(-50%);

  background:
    rgba(16,32,58,.95);

  color:white;

  padding:
    14px 24px;

  border-radius:30px;

  font-size:14px;

  display:none;

  z-index:999999;

}

</style>

</head>

<body>

<!-- POINTAGE -->

<div class="view active"
     id="view-pointage">

  <div class="header">

    <div class="header-top">

      <div class="logo">
        🍷
      </div>

      <div>

        <div class="brand-title">
          L'amusette
        </div>

        <div class="brand-sub">
          Estaminet
        </div>

      </div>

    </div>

    <div class="status">

      <div class="dot"
           id="dot"></div>

      <div class="status-text"
           id="statusText">

        Pas pointé

      </div>

      <div class="clock"
           id="clock">

        00:00

      </div>

    </div>

  </div>

  <div class="card timer-card">

    <div class="timer-state"
         id="timerState">

      PRÊT

    </div>

    <div class="timer"
         id="timer">

      0:00:00

    </div>

    <div class="timer-sub"
         id="timerSub">

      Appuie sur « Je pointe »

    </div>

    <div class="btns">

      <button class="btn btn-primary"
              id="startBtn"
              onclick="startShift()">

        Je pointe

      </button>

      <button class="btn btn-danger"
              id="stopBtn"
              onclick="stopShift()"
              disabled>

        Je dépointe

      </button>

    </div>

  </div>

  <div class="stats">

    <div class="card stat blue">

      <div class="stat-label">
        Aujourd'hui
      </div>

      <div class="stat-value"
           id="todayStat">

        0h00

      </div>

    </div>

    <div class="card stat red">

      <div class="stat-label">
        Semaine
      </div>

      <div class="stat-value"
           id="weekStat">

        0h00

      </div>

    </div>

  </div>

</div>

<!-- HISTORIQUE -->

<div class="view"
     id="view-history">

  <div class="page-title">
    Historique
  </div>

  <div class="section-header">

    <div class="section-title">
      Sessions
    </div>

    <button class="add-btn"
            onclick="openModal()">

      ＋

    </button>

  </div>

  <div class="sessions"
       id="sessions"></div>

</div>

<!-- CONTRAT -->

<div class="view"
     id="view-contract">

  <div class="page-title">
    Contrat
  </div>

  <div class="contract-card">

    <div class="contract-top">

      <div>

        <div style="font-size:24px;font-weight:700">
          Solde actuel
        </div>

      </div>

      <div class="contract-badge"
           id="contractBadge">

        39h / semaine

      </div>

    </div>

    <div class="solde-label">
      Balance contrat
    </div>

    <div class="solde-value"
         id="soldeValue">

      0h00

    </div>

    <div class="progress">

      <div class="progress-bar"
           id="progressBar"></div>

    </div>

  </div>

  <div class="settings">

    <div class="card setting">

      <label>
        Heures contrat / semaine
      </label>

      <input type="number"
             id="weeklyHoursInput"
             step="0.5">

    </div>

    <div class="card setting">

      <label>
        Solde actuel (heures)
      </label>

      <input type="number"
             id="balanceInput"
             step="0.5">

    </div>

    <button class="btn btn-primary"
            onclick="saveContract()">

      Sauvegarder

    </button>

  </div>

</div>

<!-- NAVBAR -->

<div class="nav">

  <div class="nav-item active"
       id="nav-pointage"
       onclick="goTo('pointage')">

    <div class="nav-icon">
      ⏱️
    </div>

    <div class="nav-label">
      Pointage
    </div>

  </div>

  <div class="nav-item"
       id="nav-history"
       onclick="goTo('history')">

    <div class="nav-icon">
      📅
    </div>

    <div class="nav-label">
      Historique
    </div>

  </div>

  <div class="nav-item"
       id="nav-contract"
       onclick="goTo('contract')">

    <div class="nav-icon">
      📊
    </div>

    <div class="nav-label">
      Contrat
    </div>

  </div>

</div>

<!-- MODAL -->

<div class="modal-overlay"
     id="modalOverlay">

  <div class="modal">

    <div class="modal-title">
      Ajouter une session
    </div>

    <div class="field">

      <label>Date</label>

      <input type="date"
             id="mDate">

    </div>

    <div class="field">

      <label>Entrée</label>

      <input type="time"
             id="mStart">

    </div>

    <div class="field">

      <label>Sortie</label>

      <input type="time"
             id="mEnd">

    </div>

    <div class="modal-btns">

      <button class="btn"
              onclick="closeModal()">

        Annuler

      </button>

      <button class="btn btn-primary"
              onclick="saveModal()">

        Ajouter

      </button>

    </div>

  </div>

</div>

<div class="toast"
     id="toast"></div>

<script>

/* =========================================================
STATE
========================================================= */

let sessions =
JSON.parse(localStorage.getItem('am_sessions') || '[]');

let current =
JSON.parse(localStorage.getItem('am_current') || 'null');

let settings =
JSON.parse(localStorage.getItem('am_settings') || 'null')
|| {
  weeklyHours:39,
  balance:0
};

let timerInterval = null;

/* =========================================================
NAVIGATION
========================================================= */

function goTo(view){

  document
    .querySelectorAll('.view')
    .forEach(v => v.classList.remove('active'));

  document
    .querySelectorAll('.nav-item')
    .forEach(v => v.classList.remove('active'));

  document
    .getElementById('view-' + view)
    .classList.add('active');

  document
    .getElementById('nav-' + view)
    .classList.add('active');

}

/* =========================================================
CLOCK
========================================================= */

function updateClock(){

  const now = new Date();

  document.getElementById('clock').innerText =
    now.toLocaleTimeString(
      'fr-FR',
      {
        hour:'2-digit',
        minute:'2-digit'
      }
    );

}

setInterval(updateClock,1000);

updateClock();

/* =========================================================
POINTAGE
========================================================= */

function startShift(){

  if(current) return;

  current = {
    start:new Date().toISOString()
  };

  localStorage.setItem(
    'am_current',
    JSON.stringify(current)
  );

  startTimer();

  refresh();

  toast('Entrée pointée ✓');

}

function stopShift(){

  if(!current) return;

  const end = new Date();

  const sec = Math.floor(
    (end - new Date(current.start)) / 1000
  );

  sessions.unshift({

    id:Date.now(),

    start:current.start,

    end:end.toISOString(),

    duration:sec

  });

  saveSessions();

  current = null;

  localStorage.removeItem('am_current');

  clearInterval(timerInterval);

  refresh();

  toast('Sortie pointée ✓');

}

function startTimer(){

  clearInterval(timerInterval);

  timerInterval = setInterval(() => {

    if(!current) return;

    const sec = Math.floor(
      (Date.now() - new Date(current.start)) / 1000
    );

    document.getElementById('timer').innerText =
      formatFull(sec);

  },1000);

}

/* =========================================================
REFRESH
========================================================= */

function refresh(){

  const running = !!current;

  document.getElementById('dot').className =
    'dot' + (running ? ' live' : '');

  document.getElementById('statusText').innerText =
    running ? 'En cours' : 'Pas pointé';

  document.getElementById('timerState').className =
    'timer-state' + (running ? ' live' : '');

  document.getElementById('timerState').innerText =
    running ? 'EN COURS' : 'PRÊT';

  document.getElementById('startBtn').disabled =
    running;

  document.getElementById('stopBtn').disabled =
    !running;

  if(!running){

    document.getElementById('timer').innerText =
      '0:00:00';

    document.getElementById('timerSub').innerText =
      'Appuie sur « Je pointe »';

  }else{

    document.getElementById('timerSub').innerText =
      'Depuis ' + time(new Date(current.start));

  }

  updateStats();

  renderSessions();

  renderContract();

}

/* =========================================================
STATS
========================================================= */

function updateStats(){

  document.getElementById('todayStat').innerText =
    formatShort(dayTotal(new Date()));

  document.getElementById('weekStat').innerText =
    formatShort(weekTotal());

}

/* =========================================================
CONTRACT
========================================================= */

function renderContract(){

  document.getElementById('weeklyHoursInput').value =
    settings.weeklyHours;

  document.getElementById('balanceInput').value =
    settings.balance;

  document.getElementById('contractBadge').innerText =
    settings.weeklyHours + 'h / semaine';

  const target =
    settings.weeklyHours * 3600;

  const diff =
    (settings.balance * 3600)
    + (weekTotal() - target);

  document.getElementById('soldeValue').innerText =
    (diff >= 0 ? '+' : '−')
    + formatShort(Math.abs(diff));

  document.getElementById('progressBar').style.width =
    Math.min(100,(weekTotal()/target)*100)+'%';

}

function saveContract(){

  settings.weeklyHours =
    parseFloat(
      document.getElementById('weeklyHoursInput').value
    ) || 39;

  settings.balance =
    parseFloat(
      document.getElementById('balanceInput').value
    ) || 0;

  localStorage.setItem(
    'am_settings',
    JSON.stringify(settings)
  );

  renderContract();

  toast('Contrat sauvegardé ✓');

}

/* =========================================================
SESSIONS
========================================================= */

function renderSessions(){

  const el =
    document.getElementById('sessions');

  if(!sessions.length){

    el.innerHTML = `
      <div style="
        text-align:center;
        padding:30px;
        color:var(--text3);
      ">
        Aucune session enregistrée
      </div>
    `;

    return;

  }

  let html = '';

  sessions.forEach(s => {

    const start = new Date(s.start);

    const end = new Date(s.end);

    html += `

      <div class="session">

        <div class="session-dot"></div>

        <div class="session-info">

          <div class="session-date">
            ${dateFull(start)}
          </div>

          <div class="session-hours">
            ${time(start)} → ${time(end)}
          </div>

        </div>

        <div class="session-duration">
          ${formatShort(s.duration)}
        </div>

        <div class="session-actions">

          <button class="action edit"
                  onclick="editSession(${s.id})">

            ✏️

          </button>

          <button class="action delete"
                  onclick="deleteSession(${s.id})">

            🗑️

          </button>

        </div>

      </div>

    `;

  });

  el.innerHTML = html;

}

function editSession(id){

  const s =
    sessions.find(x => x.id === id);

  if(!s) return;

  const hours =
    prompt(
      'Modifier durée (heures)',
      (s.duration / 3600).toFixed(2)
    );

  if(!hours) return;

  s.duration =
    Math.floor(parseFloat(hours) * 3600);

  saveSessions();

  refresh();

  toast('Session modifiée ✓');

}

function deleteSession(id){

  sessions =
    sessions.filter(s => s.id !== id);

  saveSessions();

  refresh();

  toast('Session supprimée');

}

/* =========================================================
MODAL
========================================================= */

function openModal(){

  const now = new Date();

  document.getElementById('mDate').value =
    now.toISOString().slice(0,10);

  document.getElementById('mStart').value =
    '09:00';

  document.getElementById('mEnd').value =
    '17:00';

  document.getElementById('modalOverlay')
    .classList.add('open');

}

function closeModal(){

  document.getElementById('modalOverlay')
    .classList.remove('open');

}

function saveModal(){

  const date =
    document.getElementById('mDate').value;

  const start =
    document.getElementById('mStart').value;

  const end =
    document.getElementById('mEnd').value;

  const startDate =
    new Date(date + 'T' + start);

  const endDate =
    new Date(date + 'T' + end);

  const sec =
    Math.floor(
      (endDate - startDate) / 1000
    );

  sessions.unshift({

    id:Date.now(),

    start:startDate.toISOString(),

    end:endDate.toISOString(),

    duration:sec

  });

  saveSessions();

  closeModal();

  refresh();

  toast('Session ajoutée ✓');

}

/* =========================================================
SAVE
========================================================= */

function saveSessions(){

  localStorage.setItem(
    'am_sessions',
    JSON.stringify(sessions)
  );

}

/* =========================================================
HELPERS
========================================================= */

function pad(n){
  return String(n).padStart(2,'0');
}

function time(d){

  return pad(d.getHours())
    + ':'
    + pad(d.getMinutes());

}

function formatShort(sec){

  sec = Math.floor(sec);

  const h =
    Math.floor(sec / 3600);

  const m =
    Math.floor((sec % 3600) / 60);

  return h + 'h' + pad(m);

}

function formatFull(sec){

  sec = Math.floor(sec);

  const h =
    Math.floor(sec / 3600);

  const m =
    Math.floor((sec % 3600) / 60);

  const s =
    sec % 60;

  return h + ':' + pad(m) + ':' + pad(s);

}

function sameDay(a,b){

  return a.getDate() === b.getDate()
    && a.getMonth() === b.getMonth()
    && a.getFullYear() === b.getFullYear();

}

function dayTotal(date){

  let total = 0;

  sessions.forEach(s => {

    const d =
      new Date(s.start);

    if(sameDay(d,date)){
      total += s.duration;
    }

  });

  return total;

}

function weekStart(date){

  const d =
    new Date(date);

  const day =
    d.getDay();

  const diff =
    d.getDate()
    - (day === 0 ? 6 : day - 1);

  d.setDate(diff);

  d.setHours(0,0,0,0);

  return d;

}

function weekTotal(){

  const start =
    weekStart(new Date());

  const end =
    new Date(start);

  end.setDate(end.getDate() + 6);

  end.setHours(23,59,59,999);

  let total = 0;

  sessions.forEach(s => {

    const d =
      new Date(s.start);

    if(d >= start && d <= end){
      total += s.duration;
    }

  });

  return total;

}

function dateFull(d){

  const days = [
    'Dimanche',
    'Lundi',
    'Mardi',
    'Mercredi',
    'Jeudi',
    'Vendredi',
    'Samedi'
  ];

  return days[d.getDay()]
    + ' '
    + pad(d.getDate())
    + '/'
    + pad(d.getMonth()+1);

}

/* =========================================================
TOAST
========================================================= */

function toast(msg){

  const el =
    document.getElementById('toast');

  el.innerText = msg;

  el.style.display = 'block';

  clearTimeout(el._t);

  el._t = setTimeout(() => {

    el.style.display = 'none';

  },2500);

}

/* =========================================================
INIT
========================================================= */

if(current){
  startTimer();
}

refresh();

</script>
